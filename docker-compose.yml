version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: rocketlaunch-db
    environment:
      POSTGRES_DB: rocketlaunch
      POSTGRES_USER: rocketuser
      POSTGRES_PASSWORD: rocketpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: